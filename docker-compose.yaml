# docker-compose.yml
version: '3'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.1-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKEND: airflow.api.auth.backend.basic_auth
    AIRFLOW__CORE__AUTHENTICATE_API_CALLS_WITH_SESSION_COOKIES: "false"
    _PIP_ADDITIONAL_REQUIREMENTS: boto3 apache-airflow-providers-amazon requests
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: eu-central-1

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0" 
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - 8080:8080
    # Temporarily disable healthcheck to avoid false "unhealthy" status
    # healthcheck:
    #   test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 10
    #   start_period: 120s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-init:
    <<: *airflow-common
    command: >
       bash -c "
         until pg_isready -h postgres -U airflow; do
           echo 'Waiting for PostgreSQL...';
           sleep 2;
       done &&
       airflow db upgrade &&
       if ! airflow users list | grep -q 'airflow'; then
          airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com;
       fi
       "
    environment:
      <<: *airflow-common-env

volumes:
  postgres-db-volume: